<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7A5F6C"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="640" fill="#FAF7F5"/>

  <!-- Browser outer boundary -->
  <rect x="40" y="60" width="820" height="520" rx="20" fill="#ffffff" stroke="#E6C8D2" stroke-width="2"/>
  <text x="70" y="95" font-size="18" font-weight="700" fill="#2E1A24">Browser (Client-Side Only — No Backend Server)</text>

  <!-- User -->
  <circle cx="120" cy="150" r="26" fill="#FF6F59"/>
  <text x="120" y="156" font-size="20" text-anchor="middle" fill="#fff">🧑</text>
  <text x="120" y="195" font-size="13" text-anchor="middle" fill="#2E1A24">User</text>

  <!-- React UI -->
  <rect x="220" y="120" width="200" height="70" rx="12" fill="#FBE7EE" stroke="#E8456F" stroke-width="1.5"/>
  <text x="320" y="150" font-size="15" font-weight="700" text-anchor="middle" fill="#2E1A24">React UI Layer</text>
  <text x="320" y="170" font-size="12" text-anchor="middle" fill="#7A5F6C">Header · SkinToggle · Form</text>

  <!-- Arrow user -> UI -->
  <line x1="146" y1="150" x2="216" y2="150" stroke="#7A5F6C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Skin Profile Data -->
  <rect x="480" y="120" width="220" height="70" rx="12" fill="#FFF3E2" stroke="#FF9776" stroke-width="1.5"/>
  <text x="590" y="150" font-size="15" font-weight="700" text-anchor="middle" fill="#2E1A24">Irritant Reference Lists</text>
  <text x="590" y="170" font-size="12" text-anchor="middle" fill="#7A5F6C">5 skin-type profiles (static)</text>

  <!-- Arrow UI -> reference -->
  <line x1="420" y1="150" x2="476" y2="150" stroke="#7A5F6C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Transformers.js model -->
  <rect x="220" y="250" width="200" height="90" rx="12" fill="#EFE6FB" stroke="#AA3BFF" stroke-width="1.5"/>
  <text x="320" y="282" font-size="15" font-weight="700" text-anchor="middle" fill="#2E1A24">Transformers.js</text>
  <text x="320" y="302" font-size="12" text-anchor="middle" fill="#7A5F6C">Xenova/all-MiniLM-L6-v2</text>
  <text x="320" y="320" font-size="12" text-anchor="middle" fill="#7A5F6C">generates embeddings</text>

  <!-- Arrow UI -> model -->
  <line x1="320" y1="190" x2="320" y2="246" stroke="#7A5F6C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow reference -> model (embeddings computed once, cached) -->
  <line x1="590" y1="190" x2="590" y2="220" stroke="#7A5F6C" stroke-width="2"/>
  <line x1="590" y1="220" x2="420" y2="285" stroke="#7A5F6C" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="235" font-size="11" fill="#9A8590">cached per profile</text>

  <!-- Cosine similarity -->
  <rect x="480" y="250" width="220" height="90" rx="12" fill="#E8F5F0" stroke="#3FA796" stroke-width="1.5"/>
  <text x="590" y="282" font-size="15" font-weight="700" text-anchor="middle" fill="#2E1A24">Cosine Similarity</text>
  <text x="590" y="302" font-size="12" text-anchor="middle" fill="#7A5F6C">compares ingredient vs.</text>
  <text x="590" y="320" font-size="12" text-anchor="middle" fill="#7A5F6C">irritant embeddings</text>

  <!-- Arrow model -> similarity -->
  <line x1="420" y1="295" x2="476" y2="295" stroke="#7A5F6C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Threshold classification -->
  <rect x="350" y="390" width="220" height="90" rx="12" fill="#FBE7EE" stroke="#E8456F" stroke-width="1.5"/>
  <text x="460" y="418" font-size="15" font-weight="700" text-anchor="middle" fill="#2E1A24">Threshold Classifier</text>
  <text x="460" y="438" font-size="12" text-anchor="middle" fill="#7A5F6C">≥0.60 flagged</text>
  <text x="460" y="454" font-size="12" text-anchor="middle" fill="#7A5F6C">≥0.45 uncertain · else safe</text>

  <!-- Arrow similarity -> classifier -->
  <line x1="590" y1="340" x2="490" y2="386" stroke="#7A5F6C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Results UI -->
  <rect x="220" y="390" width="90" height="90" rx="12" fill="#FFF" stroke="#E6C8D2" stroke-width="1.5"/>
  <text x="265" y="425" font-size="12" font-weight="700" text-anchor="middle" fill="#2E1A24">Score</text>
  <text x="265" y="445" font-size="12" text-anchor="middle" fill="#276358">Badge</text>

  <line x1="350" y1="430" x2="316" y2="430" stroke="#7A5F6C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Chip results -->
  <rect x="140" y="530" width="620" height="30" rx="8" fill="#E8F5F0" stroke="#3FA796"/>
  <text x="220" y="550" font-size="11" text-anchor="middle" fill="#276358">✅ Safe</text>
  <rect x="140" y="530" width="620" height="30" rx="8" fill="none"/>
  <text x="380" y="550" font-size="11" text-anchor="middle" fill="#6B6B6B">❔ Uncertain</text>
  <text x="560" y="550" font-size="11" text-anchor="middle" fill="#B8452F">⚠️ Flagged + Alternative</text>

  <line x1="460" y1="480" x2="450" y2="526" stroke="#7A5F6C" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="450" y="605" font-size="12" text-anchor="middle" fill="#9A8590">Only network activity: one-time model download from Hugging Face CDN on first use. Everything else runs fully offline.</text>
</svg>
